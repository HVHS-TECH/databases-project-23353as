<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>Cosmic Dash</title>
    <link rel="icon" type="image/x-icon" href="assets/images/dtec_favicon.png">

    <link href="style.css" rel="stylesheet" type="text/css" />

    <!-- firebase start ****************************************-->
    <!-- Firebase App (core Firebase SDK) is always required & must be listed 1st -->
    <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-app.js"></script>
    <!-- Add Firebase products that you want to use -->
    <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-analytics.js"></script>
    <!-- firebase end ******************************************-->
    <script src="fb_setup.js"></script>
    <script src="fb_io.js"></script>

</head>
<nav>
    <h1>Cosmic Dash</h1>
</nav>

<body>

    <img id="userPfp" src="" alt="Profile Picture">

    <script src="login.js"></script>
    <div class="form-container">
        <h2>Hello</h2>


        <button class="login-btn" onclick="fb_login()">Login with Google</button>

        <form>
            <div class="input-area">
                <label for="gameName">Your Name:</label>
                <input type="text" id="gameName" name="gameName" maxlength="20" required />
            </div>

            <div class="input-area">
                <label for="age">Age:</label>
                <input type="number" id="age" name="age" required />
            </div>
        </form>

        <button class="submit-btn" onclick="writeForm()">Submit</button>

        <p id="statusMessage"></p>
    </div>

</body>

</html>
